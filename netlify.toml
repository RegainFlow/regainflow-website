[build]
  command = "npm run build"
  publish = "build/client"

# 301 Redirects for old URLs
[[redirects]]
  from = "/fractional-cto"
  to = "/services"
  status = 301

[[redirects]]
  from = "/w2-vs-c2c"
  to = "/"
  status = 301

[[redirects]]
  from = "/services/ai-engineering"
  to = "/services/ai-transformation"
  status = 301

[[redirects]]
  from = "/services/data-engineering"
  to = "/services/ai-transformation"
  status = 301

[[redirects]]
  from = "/services/full-stack-engineering"
  to = "/services/digital-transformation"
  status = 301

[[redirects]]
  from = "/services/devops-engineering"
  to = "/services/digital-transformation"
  status = 301
