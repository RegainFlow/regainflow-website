<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d6cb;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#121213;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Grid Elements (Abstract Team) -->
  <g stroke="#ffffff" stroke-opacity="0.1" stroke-width="1">
    <path d="M100 100 L200 100 L250 186 L200 272 L100 272 L50 186 Z" />
    <path d="M260 186 L310 100 L410 100 L460 186 L410 272 L310 272 Z" />
    <path d="M420 272 L470 186 L570 186 L620 272 L570 358 L470 358 Z" />
    <path d="M100 282 L200 282 L250 368 L200 454 L100 454 L50 368 Z" />
  </g>

  <!-- Connection Lines -->
  <path d="M250 186 L310 272" stroke="#00d6cb" stroke-width="2" stroke-opacity="0.3" />
  <path d="M410 272 L470 358" stroke="#00d6cb" stroke-width="2" stroke-opacity="0.3" />

  <!-- The "New Engineer" Integration (Glowing Hexagon) -->
  <g transform="translate(350, 250)" filter="url(#glow)">
    <!-- Inner filled hex -->
    <path d="M25 0 L75 0 L100 43 L75 86 L25 86 L0 43 Z" fill="#00d6cb" fill-opacity="0.15" stroke="#00d6cb" stroke-width="2"/>
    
    <!-- Core details -->
    <circle cx="50" cy="43" r="15" fill="#00d6cb" fill-opacity="0.8" />
    <circle cx="50" cy="43" r="25" stroke="#00d6cb" stroke-width="1" stroke-dasharray="4 4" />
    
    <!-- Data streams flowing in -->
    <path d="M50 43 L-50 -20" stroke="#00d6cb" stroke-width="2" stroke-linecap="round" />
    <path d="M50 43 L150 -20" stroke="#00d6cb" stroke-width="2" stroke-linecap="round" />
    <path d="M50 43 L50 140" stroke="#00d6cb" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Decorative particles -->
  <circle cx="600" cy="100" r="2" fill="#ffffff" fill-opacity="0.5" />
  <circle cx="700" cy="500" r="2" fill="#ffffff" fill-opacity="0.5" />
  <circle cx="100" cy="500" r="3" fill="#00d6cb" fill-opacity="0.4" />

</svg>

