<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d6cb;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00d6cb;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Abstract Blueprint Grid -->
  <defs>
    <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#smallGrid)" />

  <!-- Chaos to Order Concept -->
  
  <!-- Scattered Nodes (Chaos/Problem) -->
  <g fill="#ffffff" fill-opacity="0.2">
    <circle cx="100" cy="150" r="4" />
    <circle cx="150" cy="250" r="6" />
    <circle cx="80" cy="350" r="3" />
    <circle cx="200" cy="100" r="5" />
    <circle cx="180" cy="450" r="4" />
  </g>

  <!-- The Solution Beam/Arrow -->
  <g transform="translate(0, 50)">
    <!-- Main Arrow Shape -->
    <path d="M200 250 L600 250" stroke="url(#beamGrad)" stroke-width="4" filter="url(#glow2)" />
    
    <!-- Arrow Head -->
    <path d="M580 230 L620 250 L580 270" stroke="#00d6cb" stroke-width="4" fill="none" filter="url(#glow2)" />

    <!-- Rings around the beam (Focusing) -->
    <ellipse cx="300" cy="250" rx="10" ry="40" stroke="#00d6cb" stroke-opacity="0.3" stroke-width="2" fill="none" />
    <ellipse cx="400" cy="250" rx="10" ry="30" stroke="#00d6cb" stroke-opacity="0.5" stroke-width="2" fill="none" />
    <ellipse cx="500" cy="250" rx="10" ry="20" stroke="#00d6cb" stroke-opacity="0.8" stroke-width="2" fill="none" />
  </g>

  <!-- Target Icon at the end -->
  <g transform="translate(650, 300)" stroke="#00d6cb" stroke-width="2">
    <circle cx="0" cy="0" r="20" stroke-opacity="0.5" />
    <circle cx="0" cy="0" r="10" fill="#00d6cb" fill-opacity="0.2" />
    <line x1="-25" y1="0" x2="25" y2="0" stroke-opacity="0.3" />
    <line x1="0" y1="-25" x2="0" y2="25" stroke-opacity="0.3" />
  </g>

  <!-- Data Metrics floating -->
  <rect x="550" y="150" width="100" height="60" rx="5" fill="#1a1a1b" stroke="#00d6cb" stroke-width="1" stroke-opacity="0.5" />
  <path d="M560 190 L580 180 L600 185 L620 170 L640 160" stroke="#00d6cb" stroke-width="2" fill="none" />

</svg>

