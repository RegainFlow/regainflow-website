<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Regain Flow | Book a Free Consultation</title>
  <style>
    body { background: #181a1b; color: #fff; font-family: 'Exo 2', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .contact-form { background: #23272b; padding: 2rem; border-radius: 8px; box-shadow: 0 0 20px #00d6cb33; max-width: 400px; width: 100%; }
    .contact-form h1 { color: #00d6cb; font-size: 2rem; margin-bottom: 1rem; }
    .contact-form label { display: block; margin: 1rem 0 0.5rem; }
    .contact-form input, .contact-form textarea { width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #00d6cb80; background: #181a1b; color: #fff; }
    .contact-form button { margin-top: 1.5rem; width: 100%; background: #00d6cb; color: #181a1b; border: none; padding: 0.75rem; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
    .contact-form button:hover { background: #00b3a1; }
  </style>
  <script>
    if (window.location.search.includes('success=true')) {
      alert('Thank you for your submission!');
      setTimeout(function() { window.location.href = '/contact-us'; }, 500);
    }
  </script>
</head>
<body>
  <form class="contact-form" name="contact" method="POST" data-netlify="true" action="/contact-us.html?success=true">
    <h1>Contact Us</h1>
    <input type="hidden" name="form-name" value="contact" />
    <label for="name">Name</label>
    <input id="name" name="name" type="text" required />
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required />
    <label for="role">Role</label>
    <input id="role" name="role" type="text" required />
    <label for="message">Message</label>
    <textarea id="message" name="message" required></textarea>
    <button type="submit">Submit</button>
  </form>
</body>
</html>
